<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Stone · Sheet · Blade — Hand-Sign Showdown</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #F6F4FB;
    --bg-2: #EFEBFB;
    --surface: #FFFFFF;
    --ink: #1C1A2B;
    --ink-soft: #5B5770;
    --line: #E3DFF2;

    /* Rock Paper Scissors */
    --rock: #7C8590;      --rock-soft: #EAEBEE;
    --paper: #3E8EDE;     --paper-soft: #E4F0FD;
    --scissors: #F0577A;  --scissors-soft: #FDE6EC;

    /* Lady Hunter Tiger */
    --lady: #D6549E;      --lady-soft: #FBE6F2;
    --hunter: #A9722D;    --hunter-soft: #F5E9D9;
    --tiger: #E0872C;     --tiger-soft: #FCECDA;

    /* Snake Water Gun */
    --snake: #3FAE5C;     --snake-soft: #E4F6E9;
    --water: #2FA8C9;     --water-soft: #E1F5FA;
    --gun: #5F6B7A;       --gun-soft: #E9EBEE;

    --win: #23B26D;   --win-soft: #E3F8ED;
    --lose: #E5484D;  --lose-soft: #FDECED;
    --tie: #B8860B;   --tie-soft: #FBF3DC;

    --gold: #F4B740;
    --radius: 20px;
    --shadow: 0 10px 30px -12px rgba(28,26,43,0.18);
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    min-height: 100%;
    background:
      radial-gradient(circle at 15% 10%, var(--bg-2) 0%, transparent 45%),
      radial-gradient(circle at 85% 90%, var(--bg-2) 0%, transparent 45%),
      var(--bg);
    font-family: 'Inter', sans-serif;
    color: var(--ink);
  }

  .wrap {
    max-width: 720px;
    margin: 0 auto;
    padding: 40px 20px 64px;
  }

  header {
    text-align: center;
    margin-bottom: 22px;
  }

  .eyebrow {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin: 0 0 10px;
  }

  h1 {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: clamp(30px, 6vw, 44px);
    line-height: 1.05;
    margin: 0 0 8px;
    letter-spacing: -0.01em;
    transition: opacity 0.15s ease;
  }

  h1 span.c1 { color: var(--c1); }
  h1 span.c2 { color: var(--c2); }
  h1 span.c3 { color: var(--c3); }

  .sub {
    color: var(--ink-soft);
    font-size: 15px;
    margin: 0;
  }

  /* Mode switcher */
  .mode-tabs {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 6px;
    margin: 24px 0 10px;
    box-shadow: var(--shadow);
  }

  .mode-tab {
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 13px;
    border: none;
    background: transparent;
    color: var(--ink-soft);
    padding: 10px 8px;
    border-radius: 999px;
    cursor: pointer;
    transition: background 0.15s ease, color 0.15s ease;
  }

  .mode-tab.active {
    background: var(--ink);
    color: #fff;
  }

  .mode-tab:hover:not(.active) { color: var(--ink); }
  .mode-tab:focus-visible { outline: 3px solid var(--gold); outline-offset: 2px; }

  .rules-caption {
    text-align: center;
    font-size: 12.5px;
    color: var(--ink-soft);
    margin: 0 0 24px;
    letter-spacing: 0.01em;
  }
  .rules-caption b { color: var(--ink); font-weight: 600; }

  /* Scoreboard */
  .scoreboard {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: stretch;
    gap: 12px;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 18px 22px;
    margin-bottom: 20px;
    box-shadow: var(--shadow);
  }

  .score-cell { text-align: center; }

  .score-cell .label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--ink-soft);
    margin-bottom: 4px;
  }

  .score-cell .value {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 34px;
    font-weight: 700;
    line-height: 1;
  }

  #you-score { color: var(--c2); }
  #cpu-score { color: var(--c3); }

  .score-divider {
    width: 1px;
    background: var(--line);
    align-self: center;
    height: 40px;
  }

  .ties-row {
    grid-column: 1 / -1;
    text-align: center;
    font-size: 12px;
    color: var(--ink-soft);
    padding-top: 10px;
    margin-top: 6px;
    border-top: 1px dashed var(--line);
  }
  .ties-row b { color: var(--ink); font-weight: 700; }

  /* Arena */
  .arena {
    position: relative;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 36px 20px 30px;
    margin-bottom: 26px;
    overflow: hidden;
    min-height: 210px;
  }

  .arena-row {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: 10px;
  }

  .fighter {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }

  .fighter .who {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--ink-soft);
  }

  .hand {
    width: 96px;
    height: 96px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 46px;
    background: var(--bg-2);
    border: 2px solid var(--line);
    transition: background 0.25s ease, border-color 0.25s ease, transform 0.15s ease;
  }

  .hand.shaking { animation: bump 0.32s ease-in-out infinite; }

  @keyframes bump {
    0%, 100% { transform: translateY(0) rotate(0deg); }
    50% { transform: translateY(-10px) rotate(-4deg); }
  }

  .hand.fill { background: var(--accent-soft); border-color: var(--accent); }

  .hand.winner-glow {
    box-shadow: 0 0 0 6px var(--win-soft);
    border-color: var(--win);
  }

  .vs-badge {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 13px;
    color: var(--ink);
    background: var(--gold);
    width: 44px;
    height: 44px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 12px -4px rgba(244,183,64,0.7);
  }

  .call {
    text-align: center;
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 600;
    font-size: 15px;
    color: var(--ink-soft);
    margin-top: 22px;
    min-height: 20px;
    letter-spacing: 0.02em;
  }

  /* Result banner */
  .result-banner {
    text-align: center;
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 19px;
    padding: 14px 18px;
    border-radius: 14px;
    margin-top: 18px;
    display: none;
  }
  .result-banner.show { display: block; }
  .result-banner.win { background: var(--win-soft); color: var(--win); }
  .result-banner.lose { background: var(--lose-soft); color: var(--lose); }
  .result-banner.tie { background: var(--tie-soft); color: var(--tie); }

  /* Choice buttons */
  .choices {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 14px;
    margin-bottom: 22px;
  }

  .choice-btn {
    position: relative;
    border: 2px solid var(--line);
    background: var(--surface);
    border-radius: 18px;
    padding: 20px 10px 14px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    transition: transform 0.12s ease, border-color 0.15s ease, box-shadow 0.15s ease;
  }

  .choice-btn .icon {
    font-size: 34px;
    width: 60px;
    height: 60px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--accent-soft);
    color: var(--accent);
  }

  .choice-btn .name {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 14px;
    color: var(--accent);
    text-transform: capitalize;
  }

  .choice-btn:hover:not(:disabled) {
    transform: translateY(-3px);
    box-shadow: var(--shadow);
    border-color: var(--accent);
  }

  .choice-btn:disabled { cursor: not-allowed; opacity: 0.55; }

  .choice-btn:focus-visible {
    outline: 3px solid var(--gold);
    outline-offset: 2px;
  }

  /* Reset */
  .actions {
    display: flex;
    justify-content: center;
  }

  .reset-btn {
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 13px;
    color: var(--ink-soft);
    background: transparent;
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 10px 22px;
    cursor: pointer;
    transition: all 0.15s ease;
  }
  .reset-btn:hover { border-color: var(--ink-soft); color: var(--ink); }
  .reset-btn:focus-visible { outline: 3px solid var(--gold); outline-offset: 2px; }

  /* Confetti */
  .confetti-piece {
    position: absolute;
    top: -10px;
    width: 8px;
    height: 14px;
    border-radius: 2px;
    opacity: 0.95;
    pointer-events: none;
    animation: fall 1.1s ease-in forwards;
  }
  @keyframes fall {
    to { transform: translateY(240px) rotate(340deg); opacity: 0; }
  }

  @media (prefers-reduced-motion: reduce) {
    .hand.shaking { animation: none; }
    .confetti-piece { animation: none; display: none; }
    .choice-btn:hover:not(:disabled) { transform: none; }
  }

  @media (max-width: 420px) {
    .hand { width: 76px; height: 76px; font-size: 36px; }
    .choice-btn .icon { width: 50px; height: 50px; font-size: 28px; }
    .mode-tab { font-size: 11.5px; padding: 10px 4px; }
  }
</style>
</head>
<body>

<div class="wrap">
  <header>
    <p class="eyebrow">Best-of-forever · Player vs Computer</p>
    <h1 id="title"></h1>
    <p class="sub" id="subtitle"></p>
  </header>

  <div class="mode-tabs" role="tablist" aria-label="Choose a game mode">
    <button class="mode-tab" data-mode="rps" role="tab">Rock Paper Scissors</button>
    <button class="mode-tab" data-mode="lht" role="tab">Lady Hunter Tiger</button>
    <button class="mode-tab" data-mode="swg" role="tab">Snake Water Gun</button>
  </div>
  <p class="rules-caption" id="rules-caption"></p>

  <div class="scoreboard">
    <div class="score-cell">
      <div class="label">You</div>
      <div class="value" id="you-score">0</div>
    </div>
    <div class="score-divider"></div>
    <div class="score-cell">
      <div class="label">Computer</div>
      <div class="value" id="cpu-score">0</div>
    </div>
    <div class="ties-row">Ties: <b id="tie-score">0</b> &nbsp;·&nbsp; Rounds played: <b id="round-count">0</b></div>
  </div>

  <div class="arena" id="arena">
    <div class="arena-row">
      <div class="fighter">
        <div class="who">You</div>
        <div class="hand" id="player-hand">❔</div>
      </div>
      <div class="vs-badge">VS</div>
      <div class="fighter">
        <div class="who">Computer</div>
        <div class="hand" id="cpu-hand">❔</div>
      </div>
    </div>
    <p class="call" id="call-text"></p>
    <div class="result-banner" id="result-banner"></div>
  </div>

  <div class="choices" id="choices"></div>

  <div class="actions">
    <button class="reset-btn" id="reset-btn">Reset scores for this game</button>
  </div>
</div>

<script>
  const MODES = {
    rps: {
      label: 'Rock, Paper &amp; Scissors',
      words: ['rock', 'paper', 'scissors'],
      beats: { rock: 'scissors', paper: 'rock', scissors: 'paper' },
      verbs: { rock: 'smashes', paper: 'covers', scissors: 'cuts' },
      emoji: { rock: '✊', paper: '✋', scissors: '✌️' },
      chant: ['Rock…', 'Paper…', 'Scissors…', 'Shoot!'],
      tagline: 'Choose rock, paper, or scissors to start the round.'
    },
    lht: {
      label: 'Lady, Hunter &amp; Tiger',
      words: ['lady', 'hunter', 'tiger'],
      beats: { lady: 'hunter', hunter: 'tiger', tiger: 'lady' },
      verbs: { lady: 'charms', hunter: 'shoots', tiger: 'devours' },
      emoji: { lady: '💃', hunter: '🏹', tiger: '🐯' },
      chant: ['Lady…', 'Hunter…', 'Tiger…', 'Reveal!'],
      tagline: 'Choose lady, hunter, or tiger to start the round.'
    },
    swg: {
      label: 'Snake, Water &amp; Gun',
      words: ['snake', 'water', 'gun'],
      beats: { snake: 'water', water: 'gun', gun: 'snake' },
      verbs: { snake: 'drinks', water: 'rusts', gun: 'shoots' },
      emoji: { snake: '🐍', water: '💧', gun: '🔫' },
      chant: ['Snake…', 'Water…', 'Gun…', 'Reveal!'],
      tagline: 'Choose snake, water, or gun to start the round.'
    }
  };

  const state = {
    mode: 'rps',
    locked: false,
    scores: {
      rps: { you: 0, cpu: 0, ties: 0, rounds: 0 },
      lht: { you: 0, cpu: 0, ties: 0, rounds: 0 },
      swg: { you: 0, cpu: 0, ties: 0, rounds: 0 }
    }
  };

  const titleEl = document.getElementById('title');
  const subtitleEl = document.getElementById('subtitle');
  const rulesCaptionEl = document.getElementById('rules-caption');
  const choicesEl = document.getElementById('choices');
  const playerHandEl = document.getElementById('player-hand');
  const cpuHandEl = document.getElementById('cpu-hand');
  const callText = document.getElementById('call-text');
  const resultBanner = document.getElementById('result-banner');
  const arena = document.getElementById('arena');
  const tabs = document.querySelectorAll('.mode-tab');

  function currentMode() { return MODES[state.mode]; }
  function currentScore() { return state.scores[state.mode]; }

  function renderHeader() {
    const m = currentMode();
    const [w1, w2, w3] = m.words;
    titleEl.innerHTML = `<span class="c1">${cap(w1)}</span>, <span class="c2">${cap(w2)}</span> &amp; <span class="c3">${cap(w3)}</span>`;
    subtitleEl.textContent = m.tagline;

    const captionParts = m.words.map(w => {
      const beaten = m.beats[w];
      return `<b>${cap(w)}</b> ${m.verbs[w]} ${beaten}`;
    });
    rulesCaptionEl.innerHTML = captionParts.join(' &nbsp;·&nbsp; ');
  }

  function renderChoices() {
    const m = currentMode();
    choicesEl.innerHTML = '';
    m.words.forEach(word => {
      const btn = document.createElement('button');
      btn.className = 'choice-btn';
      btn.dataset.choice = word;
      btn.style.setProperty('--accent', `var(--${word})`);
      btn.style.setProperty('--accent-soft', `var(--${word}-soft)`);
      btn.innerHTML = `<span class="icon">${m.emoji[word]}</span><span class="name">${cap(word)}</span>`;
      btn.addEventListener('click', () => playRound(word));
      choicesEl.appendChild(btn);
    });
  }

  function applyPaletteVars() {
    const m = currentMode();
    const [w1, w2, w3] = m.words;
    document.documentElement.style.setProperty('--c1', `var(--${w1})`);
    document.documentElement.style.setProperty('--c2', `var(--${w2})`);
    document.documentElement.style.setProperty('--c3', `var(--${w3})`);
  }

  function updateScoreboard() {
    const s = currentScore();
    document.getElementById('you-score').textContent = s.you;
    document.getElementById('cpu-score').textContent = s.cpu;
    document.getElementById('tie-score').textContent = s.ties;
    document.getElementById('round-count').textContent = s.rounds;
  }

  function setButtonsDisabled(disabled) {
    document.querySelectorAll('.choice-btn').forEach(b => b.disabled = disabled);
  }

  function resetHands() {
    playerHandEl.className = 'hand';
    cpuHandEl.className = 'hand';
    playerHandEl.textContent = '❔';
    cpuHandEl.textContent = '❔';
    playerHandEl.style.removeProperty('--accent');
    playerHandEl.style.removeProperty('--accent-soft');
    cpuHandEl.style.removeProperty('--accent');
    cpuHandEl.style.removeProperty('--accent-soft');
    resultBanner.className = 'result-banner';
    resultBanner.textContent = '';
  }

  function randomChoice() {
    const m = currentMode();
    return m.words[Math.floor(Math.random() * m.words.length)];
  }

  function decideWinner(player, cpu) {
    const m = currentMode();
    if (player === cpu) return 'tie';
    return m.beats[player] === cpu ? 'win' : 'lose';
  }

  function spawnConfetti() {
    const colors = ['#F4B740', '#23B26D', '#3E8EDE', '#F0577A'];
    for (let i = 0; i < 24; i++) {
      const piece = document.createElement('div');
      piece.className = 'confetti-piece';
      piece.style.left = Math.random() * 100 + '%';
      piece.style.background = colors[Math.floor(Math.random() * colors.length)];
      piece.style.animationDelay = (Math.random() * 0.15) + 's';
      arena.appendChild(piece);
      setTimeout(() => piece.remove(), 1300);
    }
  }

  function playRound(playerChoice) {
    if (state.locked) return;
    state.locked = true;
    setButtonsDisabled(true);
    resetHands();

    playerHandEl.classList.add('shaking');
    cpuHandEl.classList.add('shaking');

    const calls = currentMode().chant;
    let step = 0;
    callText.textContent = calls[0];

    const tick = setInterval(() => {
      step++;
      if (step < calls.length) {
        callText.textContent = calls[step];
      } else {
        clearInterval(tick);
        reveal(playerChoice);
      }
    }, 260);
  }

  function reveal(playerChoice) {
    const m = currentMode();
    const cpuChoice = randomChoice();
    const outcome = decideWinner(playerChoice, cpuChoice);

    playerHandEl.classList.remove('shaking');
    cpuHandEl.classList.remove('shaking');

    playerHandEl.textContent = m.emoji[playerChoice];
    cpuHandEl.textContent = m.emoji[cpuChoice];

    playerHandEl.style.setProperty('--accent', `var(--${playerChoice})`);
    playerHandEl.style.setProperty('--accent-soft', `var(--${playerChoice}-soft)`);
    cpuHandEl.style.setProperty('--accent', `var(--${cpuChoice})`);
    cpuHandEl.style.setProperty('--accent-soft', `var(--${cpuChoice}-soft)`);
    playerHandEl.classList.add('fill');
    cpuHandEl.classList.add('fill');

    const s = currentScore();
    s.rounds++;

    if (outcome === 'win') {
      s.you++;
      playerHandEl.classList.add('winner-glow');
      callText.textContent = 'Round over';
      resultBanner.textContent = `${cap(playerChoice)} ${m.verbs[playerChoice]} ${cpuChoice} — you win this round!`;
      resultBanner.classList.add('show', 'win');
      spawnConfetti();
    } else if (outcome === 'lose') {
      s.cpu++;
      cpuHandEl.classList.add('winner-glow');
      callText.textContent = 'Round over';
      resultBanner.textContent = `${cap(cpuChoice)} ${m.verbs[cpuChoice]} ${playerChoice} — computer wins this round.`;
      resultBanner.classList.add('show', 'lose');
    } else {
      callText.textContent = 'Round over';
      s.ties++;
      resultBanner.textContent = `Both picked ${playerChoice} — it's a tie.`;
      resultBanner.classList.add('show', 'tie');
    }

    updateScoreboard();

    setTimeout(() => {
      state.locked = false;
      setButtonsDisabled(false);
      callText.textContent = 'Choose your next move.';
    }, 650);
  }

  function cap(word) {
    return word.charAt(0).toUpperCase() + word.slice(1);
  }

  function switchMode(mode) {
    if (state.locked) return;
    state.mode = mode;
    tabs.forEach(t => t.classList.toggle('active', t.dataset.mode === mode));
    applyPaletteVars();
    renderHeader();
    renderChoices();
    resetHands();
    updateScoreboard();
    callText.textContent = currentMode().tagline;
  }

  tabs.forEach(tab => {
    tab.addEventListener('click', () => switchMode(tab.dataset.mode));
  });

  document.getElementById('reset-btn').addEventListener('click', () => {
    if (state.locked) return;
    state.scores[state.mode] = { you: 0, cpu: 0, ties: 0, rounds: 0 };
    updateScoreboard();
    setButtonsDisabled(false);
    resetHands();
    callText.textContent = currentMode().tagline;
  });

  switchMode('rps');
</script>

</body>
</html>
